
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>NURI – Piknik v4</title>
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/icons/icon-180.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="phone-frame">
    <header class="topbar">
      <strong>🧺 <span data-i18n="title">NURI – Piknik</span></strong>
      <div class="top-right">
        <span id="presence" class="users"></span>
        <select id="lang" class="lang">
          <option value="tr">TR</option>
          <option value="en">EN</option>
        </select>
      </div>
    </header>

    <main class="content">
      <section class="card form">
        <div class="row">
          <input id="nick" placeholder="Takma ad (örn: Ali)" data-i18n-ph="nick_ph">
          <button id="joinBtn" class="btn" data-i18n="join">Katıl</button>
        </div>

        <div class="row">
          <input id="title" placeholder="Ürün adı (örn: Köfte)" data-i18n-ph="item_ph">
        </div>

        <div class="row">
          <select id="category"></select>
          <input id="amount" type="number" min="0" step="0.01" placeholder="Miktar" data-i18n-ph="amount_ph" style="max-width:120px">
          <select id="unit"></select>
          <button id="addBtn" class="btn" data-i18n="add">Ekle</button>
        </div>

        <div class="row">
          <label class="lbl" data-i18n="event_date">Piknik tarihi</label>
          <input id="eventDate" type="datetime-local" class="dt">
          <button id="saveDate" class="btn" data-i18n="save">Kaydet</button>
          <span id="lockInfo" class="muted"></span>
        </div>
      </section>

      <section class="card">
        <div class="filters">
          <button class="chip active" data-f="all" data-i18n="all">Tümü</button>
          <button class="chip" data-f="needed" data-i18n="needed">Eksik</button>
          <button class="chip" data-f="claimed" data-i18n="claimed">Ayrılan</button>
          <button class="chip" data-f="brought" data-i18n="brought">Getirildi</button>
          <div id="catChips"></div>
        </div>
        <div id="initials" class="initials"></div>
        <ul id="list" class="list"></ul>
      </section>
    </main>

    <footer class="a2hs-hint" id="a2hs">
      <span data-i18n="a2hs">iOS: Paylaş → “Ana Ekrana Ekle” ile uygulama gibi kullan.</span>
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
